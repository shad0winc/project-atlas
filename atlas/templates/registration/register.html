<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Join Atlas</title><style>body{font-family:system-ui;max-width:36rem;margin:3rem auto;padding:0 1rem;background:#111;color:#eee}main{background:#1d1d1d;padding:2rem;border-radius:1rem}label{display:block;margin-top:1rem}input{box-sizing:border-box;width:100%;padding:.75rem;margin-top:.35rem}button{margin-top:1.5rem;padding:.8rem 1.2rem}.error{color:#ff9d9d}.meta{color:#bbb}</style></head><body><main><h1>Join Atlas</h1><p class="meta">Invitation: {{ email }} · Role: {{ role }}</p><p class="error">{{ error }}</p><form method="post" action="/register" autocomplete="on"><input type="hidden" name="token" value="{{ token }}"><label>Display name<input name="display_name" maxlength="100" value="{{ display_name }}" autocomplete="name"></label><label>Username<input name="username" required maxlength="64" value="{{ username }}" autocomplete="username"></label><label>Password<input type="password" name="password" required autocomplete="new-password"></label><label>Confirm password<input type="password" name="confirm_password" required autocomplete="new-password"></label><button type="submit">Create account</button></form></main></body></html>
