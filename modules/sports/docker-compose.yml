services:
  atlas-sports-feed:
    image: nginx:alpine
    container_name: atlas-sports-feed
    restart: unless-stopped

    volumes:
      - /mnt/storage/configs/sportyfin/output:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    ports:
      - "8097:8080"

    mem_limit: 128m
    cpus: 0.50

    networks:
      - atlas

    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1:8080/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      project-atlas.module: sports
      project-atlas.service: sports-feed

networks:
  atlas:
    external: true
