services:
  atlas-notifications-worker:
    build:
      context: ../..
      dockerfile: modules/notifications/Dockerfile

    container_name: atlas-notifications-worker
    restart: unless-stopped

    environment:
      ATLAS_NOTIFICATIONS_INTERVAL: "5"
      ATLAS_NOTIFICATIONS_WEBHOOK_URL: "${ATLAS_NOTIFICATIONS_WEBHOOK_URL:-}"
      ATLAS_NOTIFICATIONS_WEBHOOK_TIMEOUT: "${ATLAS_NOTIFICATIONS_WEBHOOK_TIMEOUT:-10}"
      ATLAS_NOTIFICATIONS_DISCORD_WEBHOOK: "${ATLAS_NOTIFICATIONS_DISCORD_WEBHOOK:-}"

    volumes:
      - /opt/project-atlas:/opt/project-atlas:ro
      - /mnt/storage/configs/atlas/runtime:/mnt/storage/configs/atlas/runtime
      - /mnt/storage/configs/atlas/notifications:/mnt/storage/configs/atlas/notifications

    mem_limit: 128m
    cpus: 0.50

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -f /mnt/storage/configs/atlas/notifications/worker-heartbeat
          && test
          $(( $(date +%s) - $(stat -c %Y /mnt/storage/configs/atlas/notifications/worker-heartbeat) ))
          -lt 30
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      project-atlas.module: notifications
      project-atlas.service: notifications-worker

    networks:
      - atlas

networks:
  atlas:
    external: true
