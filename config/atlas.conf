# Project Atlas Shared Configuration
# Source this file from Atlas scripts.

ATLAS_PROJECT_DIR="/opt/project-atlas"
ATLAS_STORAGE_ROOT="/mnt/storage"

ATLAS_MEDIA_ROOT="${ATLAS_STORAGE_ROOT}/media"
ATLAS_DOWNLOADS_ROOT="${ATLAS_STORAGE_ROOT}/downloads"
ATLAS_BACKUP_DIR="${ATLAS_STORAGE_ROOT}/backups/atlas"

ATLAS_CONFIG_ROOT="${ATLAS_STORAGE_ROOT}/configs"
ATLAS_RUNTIME_CONFIG_DIR="${ATLAS_CONFIG_ROOT}/atlas"
ATLAS_USERS_DIR="${ATLAS_RUNTIME_CONFIG_DIR}/users"
ATLAS_IDENTITY_DIR="${ATLAS_RUNTIME_CONFIG_DIR}/identity"
ATLAS_BASE_URL="http://atlas.local"
ATLAS_INVITE_EXPIRATION_DAYS="7"

ATLAS_ARI_DIR="${ATLAS_RUNTIME_CONFIG_DIR}/ari"
ATLAS_ARI_SNAPSHOT_DIR="${ATLAS_ARI_DIR}/snapshots"
ATLAS_ARI_LATEST_FILE="${ATLAS_ARI_DIR}/latest.json"

ATLAS_JELLYFIN_URL="http://127.0.0.1:8096"

# Jellyfin container library paths
ATLAS_JELLYFIN_MOVIES_PATH="/media/Movies"
ATLAS_JELLYFIN_TV_PATH="/media/TV"
ATLAS_JELLYFIN_ANIME_MOVIES_PATH="/media/Anime Movies"
ATLAS_JELLYFIN_ANIME_TV_PATH="/media/Anime TV"

ATLAS_SCHEDULER_DIR="${ATLAS_RUNTIME_CONFIG_DIR}/scheduler"
ATLAS_SCHEDULER_STATE_FILE="${ATLAS_SCHEDULER_DIR}/tasks.json"
ATLAS_SCHEDULER_LOCK_FILE="${ATLAS_SCHEDULER_DIR}/scheduler.lock"
